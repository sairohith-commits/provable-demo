services:
  postgres:
    image: postgres:16
    container_name: provable_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: provable
      POSTGRES_PASSWORD: provable
      POSTGRES_DB: provable
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a native host Postgres on 5432.
      - "5433:5432"
    volumes:
      - provable_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provable -d provable"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: provable_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - provable_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  provable_pg:
  provable_redis:
